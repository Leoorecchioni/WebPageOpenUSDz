<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vision Pro - Drag & Drop 3D</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        p {
            color: #86868b;
            margin-bottom: 40px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        /* Style pour l'image de la Méthode A */
        .ar-thumbnail {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            transition: transform 0.2s;
        }
        .ar-thumbnail:hover {
            transform: scale(1.02);
            cursor: pointer;
        }
        /* Style pour le lecteur 3D de la Méthode B */
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: #f9f9f9;
            border-radius: 12px;
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <h1>Test AR - Apple Vision Pro</h1>
    <p>Ouvrez cette page sur Safari visionOS, pincez l'objet et tirez-le hors de la fenêtre !</p>

    <div class="container">
        <h2>Méthode 1 : Lien Direct</h2>
        <p>Un simple clic ou drag-and-drop depuis cette image.</p>

        <a href="chemin/vers/votre_objet.usdz" rel="ar">
            <img class="ar-thumbnail" src="https://via.placeholder.com/300x300.png?text=Image+de+votre+objet" alt="Aperçu 3D">
        </a>
    </div>

    <div class="container">
        <h2>Méthode 2 : Model-Viewer</h2>
        <p>Vous pouvez tourner l'objet ici, ou le drag-and-drop dans votre espace.</p>

        <model-viewer
            src="chemin/vers/votre_objet.glb"
            ios-src="chemin/vers/votre_objet.usdz"
            poster="https://via.placeholder.com/400x400.png?text=Chargement..."
            alt="Modèle 3D interactif"
            shadow-intensity="1"
            camera-controls
            auto-rotate
            ar>
        </model-viewer>
    </div>

</body>
</html>
