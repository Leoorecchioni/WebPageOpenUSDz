<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenUSDZ | Vision Pro 3D Platform</title>

<!-- Model Viewer (fallback desktop / android) -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>
:root {
    --apple-bg: #f5f5f7;
    --apple-text: #1d1d1f;
    --apple-subtext: #86868b;
    --apple-blue: #0066cc;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--apple-bg);
    color: var(--apple-text);
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    height: 44px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: center;
    z-index: 999;
}

.nav-content {
    width: 100%;
    max-width: 1024px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}

/* HERO */
section {
    padding: 120px 20px;
    max-width: 1024px;
    margin: auto;
    text-align: center;
}

h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

p {
    color: var(--apple-subtext);
    font-size: 20px;
    margin-bottom: 40px;
}

/* VIEWER */
.viewer-container {
    width: 100%;
    height: 500px;
    border-radius: 30px;
    overflow: hidden;
    background: white;
    position: relative;
}

/* MODEL TAG */
model, model-viewer {
    width: 100%;
    height: 100%;
}

/* DROP ZONE FX */
.viewer-container.dragover {
    outline: 3px dashed var(--apple-blue);
}

/* BUTTON */
.ar-button {
    position: absolute;
    top: 16px;
    right: 16px;
    background: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 20px;
    margin-top: 60px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
}

.small-viewer {
    height: 200px;
    margin-top: 10px;
}
</style>
</head>

<body>

<nav>
    <div class="nav-content">
        <strong>OpenUSDZ</strong>
    </div>
</nav>

<main>

<section>
    <h1>3D for the Vision Pro era</h1>
    <p>Drag & drop your USDZ or GLB. Works on Vision Pro & Desktop.</p>

    <div class="viewer-container" id="viewer">

        <!-- Vision Pro -->
        <model id="appleModel"
            src="fender_stratocaster.usdz"
            alt="3D model"
            interaction-prompt="auto"
            ar
            camera-controls
            style="display:none;">
        </model>

        <!-- Desktop fallback -->
        <model-viewer id="fallbackModel"
            src="fender_stratocaster.glb"
            ios-src="fender_stratocaster.usdz"
            camera-controls
            auto-rotate
            ar
            style="display:none;">
        </model-viewer>

        <button class="ar-button" id="arHint">Drag a model here</button>

    </div>
</section>

<section>
    <h2>Gallery</h2>

    <div class="grid">

        <div class="card">
            <h3>Chameleon</h3>
            <div class="small-viewer">

                <model-viewer
                    src="chameleon_anim_mtl_variant.glb"
                    ios-src="chameleon_anim_mtl_variant.usdz"
                    camera-controls
                    autoplay
                    ar>
                </model-viewer>

            </div>
        </div>

        <div class="card">
            <h3>Vision Ready</h3>
            <p>Optimized for spatial computing 🥽</p>
        </div>

    </div>
</section>

</main>

<script>
/* =========================
   DEVICE DETECTION
========================= */

function isVisionOS() {
    return navigator.userAgent.includes("Vision") 
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

const appleModel = document.getElementById("appleModel");
const fallbackModel = document.getElementById("fallbackModel");

if (isVisionOS()) {
    appleModel.style.display = "block";
} else {
    fallbackModel.style.display = "block";
}

/* =========================
   DRAG & DROP
========================= */

const viewer = document.getElementById("viewer");

viewer.addEventListener("dragover", (e) => {
    e.preventDefault();
    viewer.classList.add("dragover");
});

viewer.addEventListener("dragleave", () => {
    viewer.classList.remove("dragover");
});

viewer.addEventListener("drop", (e) => {
    e.preventDefault();
    viewer.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    // USDZ → Vision Pro
    if (file.name.endsWith(".usdz")) {
        appleModel.src = url;
        fallbackModel.setAttribute("ios-src", url);
        alert("USDZ chargé 🚀 (Vision Pro ready)");
    }

    // GLB → Desktop viewer
    if (file.name.endsWith(".glb") || file.name.endsWith(".gltf")) {
        fallbackModel.src = url;
        alert("GLB chargé 💻");
    }
});

/* =========================
   UX TEXT ADAPT
========================= */

const hint = document.getElementById("arHint");

if (isVisionOS()) {
    hint.innerText = "Drag into your space 🥽";
} else {
    hint.innerText = "Drag & rotate the model 🖱️";
}
</script>

</body>
</html>
